[env:esp32-s3-dev-module]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Library Configuration
; Libraries are in the lib/ folder (local copies)
; Not using Arduino library folder to avoid incompatible SD library conflicts

; Board Configuration
board_build.partitions = default.csv
board_build.filesystem = spiffs

; CPU Configuration
board_build.cpu_freq = 240
board_build.f_cpu = 240000000L

; Flash Configuration
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.flash_size = 4MB

; USB Configuration
board_build.usb_cdc_on_boot = enabled
board_build.usb_dfu_on_boot = disabled
board_build.usb_firmware_msc_on_boot = disabled
board_build.usb_mode = hardware_cdc_jtag

; Upload Configuration
upload_speed = 921600
upload_port = COM4
upload_protocol = esptool

; Monitor Configuration
monitor_speed = 115200
monitor_port = COM4

; Build Configuration
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Use no_reset_stub after upload to avoid the ROM bootloader re-entering
; download mode during USB re-enumeration on Windows.
upload_flags =
    --after
    no_reset_stub

; PSRAM Configuration
board_build.psram_type = disabled

; JTAG Configuration
board_build.jtag = disabled

; Zigbee Configuration
board_build.zigbee_mode = disabled

; Erase Flash (set to true if you need to erase all flash before upload)
board_build.erase_flash = false


; ---------------------------------------------------------
; Custom PCB environment
; ---------------------------------------------------------
[env:custom-board]
platform = espressif32
board = custom_s3
framework = arduino

; SPI/AFE pins: lib/HELPStatLib/constants.h (do not use -DMOSI/-DMISO/-DSCK — clashes with Arduino headers).
; Override only safe macros, e.g. -DCS=38 for a different AFE chip-select GPIO.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

upload_speed = 921600
upload_flags =
    --after
    no_reset_stub
; upload_port and monitor_port should be set on the command line or
; in your global platformio.ini depending on how the custom PCB enumerates.

; monitor settings are inherited and may be overridden

; you can add additional board_build.* options here if your custom PCB has
; different flash size, filesystem, etc.

; Explicit CS=38 (same as constants.h default for this repo; use for a clean override).
[env:lab-board-cs38]
extends = env:custom-board
build_flags =
    ${env:custom-board.build_flags}
    -DCS=38

; New_EIS_PCB_Akshay (KiCad): AFE CS=38, SD CS=40, no AFE IRQ line (SPI DFT poll), SPI display IO39/IO3/IO21.
; Uses moononournation/GFX for ST7789-class FPC; change eis_board_ui.cpp if your panel uses another driver.
[env:eis-pcb-akshay]
extends = env:custom-board
board_build.psram_type = opi
build_flags =
    ${env:custom-board.build_flags}
    -DBOARD_EIS_PCB_AKSHAY=1
    -DBOARD_HAS_PSRAM=1
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3


