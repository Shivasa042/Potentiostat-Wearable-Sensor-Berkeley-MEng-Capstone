[env:esp32-s3-dev-module]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Library Configuration
; Libraries are in the lib/ folder (local copies)
; Not using Arduino library folder to avoid incompatible SD library conflicts

; Board Configuration
board_build.partitions = default.csv
board_build.filesystem = spiffs

; CPU Configuration
board_build.cpu_freq = 240
board_build.f_cpu = 240000000L

; Flash Configuration
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.flash_size = 4MB

; USB Configuration
board_build.usb_cdc_on_boot = enabled
board_build.usb_dfu_on_boot = disabled
board_build.usb_firmware_msc_on_boot = disabled
board_build.usb_mode = hardware_cdc_jtag

; Upload Configuration
upload_speed = 921600
upload_port = COM4
upload_protocol = esptool

; Monitor Configuration
monitor_speed = 115200
monitor_port = COM4

; Build Configuration
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Use no_reset_stub after upload to avoid the ROM bootloader re-entering
; download mode during USB re-enumeration on Windows.
upload_flags =
    --after
    no_reset_stub

; PSRAM Configuration
board_build.psram_type = disabled

; JTAG Configuration
board_build.jtag = disabled

; Zigbee Configuration
board_build.zigbee_mode = disabled

; Erase Flash (set to true if you need to erase all flash before upload)
board_build.erase_flash = false


; ---------------------------------------------------------
; Custom PCB environment
; ---------------------------------------------------------
[env:custom-board]
platform = espressif32
board = custom_s3.json    ; local board description file (placed under "boards/")
framework = arduino

; override pin assignments using build flags (one example set below)
build_flags = \
    -DMOSI=35 \
    -DMISO=37 \
    -DSCK=36 \
    -DCS=11 \
    -DRESET=10 \
    -DESP32_INTERRUPT=9 \
    -DCS_SD=21

upload_speed = 921600
; upload_port and monitor_port should be set on the command line or
; in your global platformio.ini depending on how the custom PCB enumerates.

; monitor settings are inherited and may be overridden

; you can add additional board_build.* options here if your custom PCB has
; different flash size, filesystem, etc.


